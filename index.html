<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonnie Official TH</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; min-height: 100vh; }

    .top-banner { height: 250px; overflow: hidden; background: #ddd; }
    .top-banner img { width: 100%; height: 250px; object-fit: cover; object-position: center; }

    .navbar { background: #c084fc; display: flex; align-items: center; padding: 0 16px; height: 44px; }
    .nav-logo { font-size: 13px; color: #fff; font-weight: 700; font-style: italic; }

    .main { display: flex; }

    .sidebar { width: 120px; min-width: 100px; padding: 12px 0; background: #fff; border-right: 1px solid #e5e5e5; }
    .sidebar a { display: block; padding: 10px 16px; font-size: 12px; font-weight: 700; color: #7c3aed; text-decoration: none; letter-spacing: .5px; border-bottom: 1px solid #f0e6ff; }
    .sidebar a:hover { background: #f5f0ff; }

    .content { flex: 1; padding: 12px; min-width: 0; }

    /* Slider — aspect ratio 3:1 (1200×400) */
    .slider-box { position: relative; aspect-ratio: 3/1; border-radius: 8px; overflow: hidden; background: #ddd; cursor: grab; user-select: none; }
    .slider-box img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: none; pointer-events: none; }
    .slider-box img.active { display: block; }
    .slider-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 2; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.6); cursor: pointer; }
    .dot.active { background: #7c3aed; }

    .tabs-row { display: flex; margin: 14px 0 10px; border-bottom: 2px solid #e5e5e5; }
    .tab { padding: 6px 16px; font-size: 12px; font-weight: 700; color: #888; cursor: pointer; letter-spacing: .5px; }
    .tab.active { color: #7c3aed; border-bottom: 2px solid #7c3aed; margin-bottom: -2px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .lower { display: flex; gap: 12px; align-items: flex-start; }
    .profile-wrap { flex: 1; min-width: 0; }
    /* Profile — aspect ratio 4:3 (800×600) */
    .profile-img { border-radius: 8px; width: 100%; aspect-ratio: 4/3; border: 2px solid #7c3aed; object-fit: cover; object-position: center; background: #ddd; display: block; }
    .bio-text { font-size: 13px; color: #555; line-height: 1.7; margin-top: 8px; }

    .calendar-wrap { width: 33%; flex-shrink: 0; }
    .cal-label { font-size: 11px; font-weight: 800; color: #7c3aed; letter-spacing: 1px; margin-bottom: 6px; }
    .calendar { border: 1px solid #d8b4fe; border-radius: 8px; padding: 10px; background: #fff; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cal-header select { border: 1px solid #d8b4fe; border-radius: 4px; padding: 2px 6px; font-size: 12px; color: #555; background: #fff; }
    .cal-nav { background: none; border: none; font-size: 16px; cursor: pointer; color: #7c3aed; padding: 0 4px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .cal-grid .day-label { font-size: 10px; color: #888; padding: 2px 0; }
    .cal-grid .day { font-size: 11px; padding: 4px 2px; border-radius: 4px; cursor: pointer; color: #444; }
    .cal-grid .day:hover { background: #f0e6ff; }
    .cal-grid .day.today { background: #1a1a1a; color: #fff; }
    .cal-grid .day.highlight { background: #7c3aed; color: #fff; }
    .cal-grid .day.muted { color: #ccc; }

    .social-section { margin-top: 14px; }
    .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .s-name { font-size: 11px; font-weight: 800; color: #7c3aed; letter-spacing: .5px; margin-bottom: 4px; }
    /* Socials — aspect ratio 1:1 (400×400) */
    .social-thumb { border-radius: 8px; width: 100%; aspect-ratio: 1/1; object-fit: cover; object-position: center; background: #ddd; display: block; }
    .social-link { text-decoration: none; }

    .yt-section { margin-top: 14px; }
    .yt-label { font-size: 11px; font-weight: 800; color: #7c3aed; letter-spacing: 1px; margin-bottom: 8px; }
    .yt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    /* Video thumbnail — aspect ratio 16:9 (640×360) */
    .yt-thumb { border-radius: 8px; width: 100%; aspect-ratio: 16/9; object-fit: cover; object-position: center; background: #ddd; display: block; }
    .yt-link { text-decoration: none; }

    .loading { text-align: center; padding: 20px; color: #aaa; font-size: 13px; }
    .news-item { padding: 10px 0; border-bottom: 1px solid #f0e6ff; }
    .news-item:last-child { border-bottom: none; }
    .news-date { font-size: 11px; color: #aaa; margin-bottom: 2px; }
    .news-title { font-size: 13px; color: #444; }
    .works-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
    .work-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }
    .work-title { font-size: 11px; color: #7c3aed; font-weight: 700; margin-top: 4px; }

    @media (max-width: 640px) {
      .top-banner { height: auto; }
      .top-banner img { height: auto; aspect-ratio: 4/1; }
      .main { flex-direction: column; }
      .sidebar { width: 100%; display: flex; flex-direction: row; overflow-x: auto; padding: 0; border-right: none; border-bottom: 1px solid #e5e5e5; }
      .sidebar a { flex-shrink: 0; padding: 12px 16px; border-bottom: none; border-right: 1px solid #f0e6ff; }
      .lower { flex-direction: column; }
      .profile-wrap { width: 100%; }
      .calendar-wrap { width: 100%; }
      .social-grid { grid-template-columns: repeat(2, 1fr); }
      .yt-grid { grid-template-columns: 1fr; }
      .works-grid { grid-template-columns: 1fr; }
      .work-item img { height: auto; aspect-ratio: 16/9; }
      .tab { padding: 10px 14px; font-size: 13px; }
      .bio-text { font-size: 14px; }
      .cal-grid .day { font-size: 13px; padding: 6px 2px; }
      .cal-grid .day-label { font-size: 11px; }
    }
  </style>
</head>
<body>

  <div class="top-banner">
    <img id="banner-img" src="" alt="Banner">
  </div>

  <nav class="navbar">
    <span class="nav-logo" id="nav-logo">✿ Bonnie Official TH</span>
  </nav>

  <div class="main">
    <aside class="sidebar">
      <a href="#">HOME</a>
      <a href="#">YOUTUBE</a>
      <a href="#">CONTACT US</a>
    </aside>

    <div class="content">

      <div class="slider-box" id="slider-box">
        <div class="slider-dots" id="slider-dots"></div>
      </div>

      <div class="tabs-row">
        <div class="tab active" onclick="switchTab('profile',this)">PROFILE</div>
        <div class="tab" onclick="switchTab('works',this)">WORKS</div>
        <div class="tab" onclick="switchTab('news',this)">NEWS</div>
      </div>

      <div class="tab-content active" id="tab-profile">
        <div class="lower">
          <div class="profile-wrap">
            <img class="profile-img" id="profile-img" src="" alt="Profile">
          </div>
          <div class="calendar-wrap">
            <div class="cal-label">SCHEDULE</div>
            <div class="calendar">
              <div class="cal-header">
                <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
                <select id="cal-month" onchange="renderCalendar()">
                  <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
                  <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
                  <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
                  <option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
                </select>
                <select id="cal-year" onchange="renderCalendar()">
                  <option>2024</option><option selected>2025</option><option>2026</option>
                </select>
                <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
              </div>
              <div class="cal-grid" id="cal-grid"></div>
            </div>
          </div>
        </div>
        <p class="bio-text" id="bio-text"></p>
      </div>

      <div class="tab-content" id="tab-works">
        <div class="works-grid" id="works-grid"><div class="loading">กำลังโหลด...</div></div>
      </div>

      <div class="tab-content" id="tab-news">
        <div id="news-list"><div class="loading">กำลังโหลด...</div></div>
      </div>

      <div class="social-section">
        <div class="social-grid" id="social-grid">
          <div><div class="s-name">IG</div><div class="social-thumb" style="background:#ddd"></div></div>
          <div><div class="s-name">X</div><div class="social-thumb" style="background:#ddd"></div></div>
          <div><div class="s-name">TIKTOK</div><div class="social-thumb" style="background:#ddd"></div></div>
          <div><div class="s-name">WEIBO</div><div class="social-thumb" style="background:#ddd"></div></div>
        </div>
      </div>

      <div class="yt-section">
        <div class="yt-label">OFFICIAL VIDEO</div>
        <div class="yt-grid" id="yt-grid">
          <div class="yt-thumb" style="background:#ddd"></div>
          <div class="yt-thumb" style="background:#ddd"></div>
        </div>
      </div>

    </div>
  </div>

<script>
// 🔧 ใส่ URL Google Sheets ตรงนี้
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1aAyI6iVaNDvBRWbwCvd8nMnBMrRMQPoxXR6Kix-iFvb9tDCXJDugY3NalvvY5ZSjIA8uGmJdCcpm/pub?output=csv&gid=0";

// gid ของแต่ละ sheet (ดูได้จาก URL ตอนคลิก tab ใน Sheets)
const GID = {
  config:   0,
  slider:   214809573,
  works:    326427666,
  news:     2006339432,
  socials:  1571914792,
  videos:   1639743877,
  schedule: 1512851118
};

let scheduleDates = [];
let sliderImages = [];
let sliderIndex = 0;
let sliderTimer;

function getSheetUrl(gid) {
  return SHEET_URL.replace(/gid=\d+/, "gid=" + gid);
}

async function fetchCSV(gid) {
  try {
    const res = await fetch(getSheetUrl(gid));
    const text = await res.text();
    return text.trim().split("\n").slice(1).map(row =>
      row.split(",").map(c => c.trim().replace(/^"|"$/g, ""))
    ).filter(r => r[0]);
  } catch(e) { return []; }
}

function convertDriveUrl(url) {
  if (!url) return "";
  const m = url.match(/\/d\/([^\/]+)/);
  if (m) return "https://drive.google.com/thumbnail?id=" + m[1] + "&sz=w1200";
  const m2 = url.match(/id=([^&]+)/);
  if (m2) return "https://drive.google.com/thumbnail?id=" + m2[1] + "&sz=w1200";
  return url;
}

async function loadConfig() {
  const rows = await fetchCSV(GID.config);
  const cfg = {};
  rows.forEach(r => { if(r[0]) cfg[r[0]] = r[1]; });
  if (cfg.banner_url) {
    const img = document.getElementById("banner-img");
    img.src = convertDriveUrl(cfg.banner_url);
  }
  if (cfg.profile_img_url) {
    document.getElementById("profile-img").src = convertDriveUrl(cfg.profile_img_url);
  }
  if (cfg.bio) document.getElementById("bio-text").textContent = cfg.bio;
  if (cfg.navbar_color) document.querySelector(".navbar").style.background = cfg.navbar_color;
  if (cfg.site_name) {
    document.getElementById("nav-logo").textContent = cfg.site_name;
    document.title = cfg.site_name;
  }
}

async function loadSlider() {
  const rows = await fetchCSV(GID.slider);
  sliderImages = rows.map(r => convertDriveUrl(r[0])).filter(Boolean);
  const box = document.getElementById("slider-box");
  const dotsEl = document.getElementById("slider-dots");
  if (!sliderImages.length) return;

  sliderImages.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = src;
    if (i === 0) img.classList.add("active");
    box.insertBefore(img, dotsEl);
  });

  dotsEl.innerHTML = sliderImages.map((_, i) =>
    '<div class="dot' + (i===0?' active':'') + '" onclick="goSlide(' + i + ')"></div>'
  ).join("");

  startSlider();
}

function goSlide(i) {
  const imgs = document.querySelectorAll("#slider-box img");
  const dots = document.querySelectorAll("#slider-dots .dot");
  imgs.forEach(el => el.classList.remove("active"));
  dots.forEach(el => el.classList.remove("active"));
  sliderIndex = (i + sliderImages.length) % sliderImages.length;
  imgs[sliderIndex].classList.add("active");
  dots[sliderIndex].classList.add("active");
}

function startSlider() {
  if (sliderImages.length < 2) return;
  clearInterval(sliderTimer);
  sliderTimer = setInterval(() => goSlide(sliderIndex + 1), 3000);

  const box = document.getElementById("slider-box");

  // Touch swipe (มือถือ)
  let startX = 0;
  box.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, { passive: true });
  box.addEventListener("touchend", e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) {
      clearInterval(sliderTimer);
      goSlide(sliderIndex + (diff > 0 ? 1 : -1));
      startSlider();
    }
  }, { passive: true });

  // Mouse drag (คอม)
  let mouseStartX = 0;
  let dragging = false;
  box.addEventListener("mousedown", e => { mouseStartX = e.clientX; dragging = true; });
  box.addEventListener("mouseup", e => {
    if (!dragging) return;
    dragging = false;
    const diff = mouseStartX - e.clientX;
    if (Math.abs(diff) > 40) {
      clearInterval(sliderTimer);
      goSlide(sliderIndex + (diff > 0 ? 1 : -1));
      startSlider();
    }
  });
}

async function loadWorks() {
  const rows = await fetchCSV(GID.works);
  const grid = document.getElementById("works-grid");
  if (!rows.length) { grid.innerHTML = "<div class='loading'>ยังไม่มีข้อมูล</div>"; return; }
  grid.innerHTML = rows.map(r =>
    '<div class="work-item"><a href="' + (r[2]||'#') + '" target="_blank"><img src="' + convertDriveUrl(r[1]) + '" alt="' + r[0] + '"></a><div class="work-title">' + r[0] + '</div></div>'
  ).join("");
}

async function loadNews() {
  const rows = await fetchCSV(GID.news);
  const list = document.getElementById("news-list");
  if (!rows.length) { list.innerHTML = "<div class='loading'>ยังไม่มีข้อมูล</div>"; return; }
  list.innerHTML = rows.map(r =>
    '<div class="news-item"><div class="news-date">' + r[0] + '</div><div class="news-title"><a href="' + (r[2]||'#') + '" target="_blank" style="color:#444;text-decoration:none">' + r[1] + '</a></div></div>'
  ).join("");
}

async function loadSocials() {
  const rows = await fetchCSV(GID.socials);
  if (!rows.length) return;
  document.getElementById("social-grid").innerHTML = rows.map(r =>
    '<div><div class="s-name">' + r[0] + '</div><a href="' + (r[2]||'#') + '" target="_blank" class="social-link"><img src="' + convertDriveUrl(r[1]) + '" class="social-thumb" alt="' + r[0] + '"></a></div>'
  ).join("");
}

async function loadVideos() {
  const rows = await fetchCSV(GID.videos);
  if (!rows.length) return;
  document.getElementById("yt-grid").innerHTML = rows.map(r =>
    '<a href="' + (r[1]||'#') + '" target="_blank" class="yt-link"><img src="' + convertDriveUrl(r[0]) + '" class="yt-thumb" alt="video"></a>'
  ).join("");
}

async function loadSchedule() {
  const rows = await fetchCSV(GID.schedule);
  scheduleDates = rows.map(r => r[0]).filter(Boolean);
  renderCalendar();
}

function renderCalendar() {
  const month = parseInt(document.getElementById("cal-month").value);
  const year = parseInt(document.getElementById("cal-year").value);
  const today = new Date();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const days = ["Su","Mo","Tu","We","Th","Fr","Sa"];
  let html = days.map(d => '<div class="day-label">' + d + '</div>').join("");
  for (let i = 0; i < firstDay; i++) html += '<div class="day muted"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = year + "-" + String(month+1).padStart(2,'0') + "-" + String(d).padStart(2,'0');
    const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    const isEvent = scheduleDates.includes(dateStr);
    const cls = isToday ? "today" : isEvent ? "highlight" : "";
    html += '<div class="day ' + cls + '">' + d + '</div>';
  }
  const remaining = (7 - (firstDay + daysInMonth) % 7) % 7;
  for (let i = 1; i <= remaining; i++) html += '<div class="day muted">' + i + '</div>';
  document.getElementById("cal-grid").innerHTML = html;
}

function changeMonth(dir) {
  const sel = document.getElementById("cal-month");
  const yrSel = document.getElementById("cal-year");
  let m = parseInt(sel.value) + dir;
  let y = parseInt(yrSel.value);
  if (m < 0) { m = 11; y--; }
  if (m > 11) { m = 0; y++; }
  sel.value = m;
  yrSel.value = y;
  renderCalendar();
}

function switchTab(name, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("tab-" + name).classList.add("active");
}

async function init() {
  renderCalendar();
  await Promise.all([
    loadConfig(), loadSlider(), loadWorks(),
    loadNews(), loadSocials(), loadVideos(), loadSchedule()
  ]);
}

init();
</script>
</body>
</html>
