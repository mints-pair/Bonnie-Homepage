<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonnie Official TH</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; min-height: 100vh; }

    /* Banner */
    .top-banner { background: #ddd; height: 110px; display: flex; align-items: center; justify-content: center; }
    .top-banner span { font-size: 48px; color: #999; letter-spacing: 2px; }

    /* Navbar */
    .navbar { background: #c084fc; display: flex; align-items: center; padding: 0 16px; height: 44px; }
    .nav-logo { font-size: 13px; color: #fff; font-weight: 700; font-style: italic; }

    /* Layout */
    .main { display: flex; }

    /* Sidebar */
    .sidebar { width: 120px; min-width: 100px; padding: 12px 0; background: #fff; border-right: 1px solid #e5e5e5; }
    .sidebar a { display: block; padding: 10px 16px; font-size: 12px; font-weight: 700; color: #7c3aed; text-decoration: none; letter-spacing: .5px; border-bottom: 1px solid #f0e6ff; }
    .sidebar a:hover { background: #f5f0ff; }

    /* Content */
    .content { flex: 1; padding: 12px; min-width: 0; }

    /* Slider */
    .slider-box { background: #ddd; height: 140px; border-radius: 8px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; }
    .slider-dots { display: flex; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; }
    .dot.active { background: #7c3aed; }

    /* Tabs */
    .tabs-row { display: flex; margin: 14px 0 10px; border-bottom: 2px solid #e5e5e5; }
    .tab { padding: 6px 16px; font-size: 12px; font-weight: 700; color: #888; cursor: pointer; letter-spacing: .5px; }
    .tab.active { color: #7c3aed; border-bottom: 2px solid #7c3aed; margin-bottom: -2px; }

    /* Profile + Calendar row */
    .lower { display: flex; gap: 12px; align-items: flex-start; }
    .profile-img { background: #ddd; border-radius: 8px; width: 280px; min-width: 200px; height: 200px; border: 2px solid #7c3aed; flex-shrink: 0; }

    /* Calendar */
    .calendar-wrap { flex: 1; }
    .cal-label { font-size: 11px; font-weight: 800; color: #7c3aed; letter-spacing: 1px; margin-bottom: 6px; }
    .calendar { border: 1px solid #d8b4fe; border-radius: 8px; padding: 10px; background: #fff; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cal-header select { border: 1px solid #d8b4fe; border-radius: 4px; padding: 2px 6px; font-size: 12px; color: #555; background: #fff; }
    .cal-nav { background: none; border: none; font-size: 16px; cursor: pointer; color: #7c3aed; padding: 0 4px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .cal-grid .day-label { font-size: 10px; color: #888; padding: 2px 0; }
    .cal-grid .day { font-size: 11px; padding: 4px 2px; border-radius: 4px; cursor: pointer; color: #444; }
    .cal-grid .day:hover { background: #f0e6ff; }
    .cal-grid .day.today { background: #1a1a1a; color: #fff; }
    .cal-grid .day.highlight { background: #7c3aed; color: #fff; }
    .cal-grid .day.muted { color: #ccc; }

    /* Socials */
    .social-section { margin-top: 14px; }
    .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .s-name { font-size: 11px; font-weight: 800; color: #7c3aed; letter-spacing: .5px; margin-bottom: 4px; }
    .social-thumb { background: #ddd; border-radius: 8px; height: 72px; }

    /* YouTube / Official Video */
    .yt-section { margin-top: 14px; }
    .yt-label { font-size: 11px; font-weight: 800; color: #7c3aed; letter-spacing: 1px; margin-bottom: 8px; }
    .yt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .yt-thumb { background: #ddd; border-radius: 8px; height: 88px; }
  </style>
</head>
<body>

  <!-- แทนที่ด้วยรูป Banner จริง: เปลี่ยน .top-banner เป็น <img src="banner.jpg"> -->
  <div class="top-banner"><span>Banner</span></div>

  <nav class="navbar">
    <span class="nav-logo">✿ Bonnie Official TH</span>
  </nav>

  <div class="main">
    <aside class="sidebar">
      <a href="#">HOME</a>
      <a href="#">YOUTUBE</a>
      <a href="#">CONTACT US</a>
    </aside>

    <div class="content">

      <!-- Slider: แทนที่ด้วย <img> หรือ swiper library -->
      <div class="slider-box">
        <div class="slider-dots">
          <div class="dot active"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

      <div class="tabs-row">
        <div class="tab active">PROFILE</div>
        <div class="tab">WORKS</div>
        <div class="tab">NEWS</div>
      </div>

      <div class="lower">
        <!-- แทนที่ด้วย <img src="profile.jpg" class="profile-img"> -->
        <div class="profile-img"></div>

        <div class="calendar-wrap">
          <div class="cal-label">SCHEDULE</div>
          <div class="calendar">
            <div class="cal-header">
              <button class="cal-nav">&#8249;</button>
              <select>
                <option>Jan</option><option>Feb</option><option>Mar</option>
                <option>Apr</option><option>May</option><option>Jun</option>
                <option>Jul</option><option>Aug</option><option selected>Sep</option>
                <option>Oct</option><option>Nov</option><option>Dec</option>
              </select>
              <select>
                <option>2024</option><option selected>2025</option><option>2026</option>
              </select>
              <button class="cal-nav">&#8250;</button>
            </div>
            <div class="cal-grid">
              <div class="day-label">Su</div><div class="day-label">Mo</div><div class="day-label">Tu</div>
              <div class="day-label">We</div><div class="day-label">Th</div><div class="day-label">Fr</div><div class="day-label">Sa</div>
              <div class="day muted"></div><div class="day">1</div><div class="day">2</div><div class="day">3</div><div class="day">4</div><div class="day">5</div><div class="day">6</div>
              <div class="day">7</div><div class="day">8</div><div class="day today">9</div><div class="day">10</div><div class="day">11</div><div class="day">12</div><div class="day highlight">13</div>
              <div class="day">14</div><div class="day">15</div><div class="day">16</div><div class="day">17</div><div class="day">18</div><div class="day">19</div><div class="day">20</div>
              <div class="day">21</div><div class="day">22</div><div class="day">23</div><div class="day">24</div><div class="day">25</div><div class="day">26</div><div class="day">27</div>
              <div class="day">28</div><div class="day">29</div><div class="day">30</div>
              <div class="day muted">1</div><div class="day muted">2</div><div class="day muted">3</div><div class="day muted">4</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Socials: แทนที่ .social-thumb ด้วย <img src="ig-preview.jpg"> -->
      <div class="social-section">
        <div class="social-grid">
          <div><div class="s-name">IG</div><div class="social-thumb"></div></div>
          <div><div class="s-name">X</div><div class="social-thumb"></div></div>
          <div><div class="s-name">TIKTOK</div><div class="social-thumb"></div></div>
          <div><div class="s-name">WEIBO</div><div class="social-thumb"></div></div>
        </div>
      </div>

      <!-- Official Video: แทนที่ .yt-thumb ด้วย <iframe> YouTube embed -->
      <div class="yt-section">
        <div class="yt-label">OFFICIAL VIDEO</div>
        <div class="yt-grid">
          <div class="yt-thumb"></div>
          <div class="yt-thumb"></div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
