<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonnie Official TH</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; min-height: 100vh; }

    /* Loading Spinner */
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .spinner { width: 44px; height: 44px; border: 4px solid #f0e6ff; border-top: 4px solid #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .spinner-text { margin-top: 12px; font-size: 13px; color: #7c3aed; font-weight: 500; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Banner Slider */
    .top-banner { position: relative; height: 200px; overflow: hidden; background: #ddd; cursor: grab; user-select: none; }
    .top-banner img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; display: none; pointer-events: none; }
    .top-banner img.active { display: block; }
    .banner-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 2; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.6); cursor: pointer; }
    .dot.active { background: #7c3aed; }
    .yt-link { text-decoration: none; display: block; }

    .navbar { background: #c084fc; display: flex; align-items: center; padding: 0 16px; height: 44px; }
    .nav-logo { font-size: 13px; color: #fff; font-weight: 700; font-style: italic; }

    .main { display: flex; }

    .sidebar { width: 120px; min-width: 100px; padding: 12px 0; background: #fff; border-right: 1px solid #e5e5e5; }
    .sidebar a { display: block; padding: 10px 16px; font-size: 12px; font-weight: 700; color: #7c3aed; text-decoration: none; letter-spacing: .5px; border-bottom: 1px solid #f0e6ff; }
    .sidebar a:hover { background: #f5f0ff; }

    .content { flex: 1; padding: 12px; min-width: 0; }

    .tabs-row { display: flex; margin: 14px 0 10px; border-bottom: 2px solid #e5e5e5; }
    .tab { padding: 6px 16px; font-size: 12px; font-weight: 700; color: #888; cursor: pointer; letter-spacing: .5px; }
    .tab.active { color: #7c3aed; border-bottom: 2px solid #7c3aed; margin-bottom: -2px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .lower { display: flex; gap: 12px; align-items: flex-start; }
    .profile-wrap { flex: 1; min-width: 0; }
    /* Profile slider */
    .profile-slider-wrap { position: relative; padding: 0 2px; }
    .profile-slider { display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; padding-bottom: 8px; cursor: grab; scroll-behavior: smooth; }
    .profile-slider::-webkit-scrollbar { display: none; }
    .profile-img { border-radius: 8px; width: calc((100% - 12px) / 2); aspect-ratio: 210/297; border: 2px solid #7c3aed; object-fit: cover; object-position: center; background: #ddd; display: block; flex-shrink: 0; scroll-snap-align: start; }
    .profile-nav { position: absolute; top: 40%; transform: translateY(-50%); background: rgba(124,58,237,0.85); border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; transition: opacity 0.2s; }
    .profile-nav.left { left: -14px; }
    .profile-nav.right { right: -14px; }
    .profile-nav.hidden { opacity: 0; pointer-events: none; }
    .bio-text { color: #555; line-height: 1.7; margin-top: 8px; }

    /* Works calendar layout */
    .works-cal-row { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 8px; }
    .works-cal-left { width: 50%; flex-shrink: 0; }
    .works-cal-right { flex: 1; min-height: 200px; }

    .calendar-wrap { width: 33%; flex-shrink: 0; }
    .cal-label { font-size: 11px; font-weight: 800; color: #7c3aed; letter-spacing: 1px; margin-bottom: 6px; }
    .calendar { border: 1px solid #d8b4fe; border-radius: 8px; padding: 10px; background: #fff; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cal-header select { border: 1px solid #d8b4fe; border-radius: 4px; padding: 2px 6px; font-size: 12px; color: #555; background: #fff; }
    .cal-nav { background: none; border: none; font-size: 16px; cursor: pointer; color: #7c3aed; padding: 0 4px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .cal-grid .day-label { font-size: 10px; color: #888; padding: 4px 0; }
    .cal-grid .day { font-size: 11px; padding: 7px 2px; border-radius: 4px; cursor: pointer; color: #444; position: relative; }
    .cal-grid .day:hover { background: #f0e6ff; box-shadow: 0 2px 6px rgba(124,58,237,0.15); }
    .cal-grid .day.today { background: #1a1a1a; color: #fff; }
    .cal-grid .day.highlight { background: none; color: #444; }
    .cal-grid .day.highlight:hover { background: #f0e6ff; box-shadow: 0 2px 6px rgba(124,58,237,0.15); }
    .cal-grid .day.selected { outline: 2px solid #7c3aed; }
    .cal-grid .day.muted { color: #ccc; }
    .event-dot { width: 5px; height: 5px; border-radius: 50%; background: #7c3aed; position: absolute; bottom: 0px; left: 50%; transform: translateX(-50%); }
    .day.today .event-dot { background: #fff; }
    .event-item { border-bottom: 1px solid #f0e6ff; padding: 8px 0; }
    .event-item:last-child { border-bottom: none; }
    .event-item .e-name { font-weight: 700; color: #3b0764; margin-bottom: 4px; }
    .event-item .e-row { color: #555; margin-bottom: 2px; }
    .event-item .e-row span { color: #7c3aed; font-weight: 700; margin-right: 6px; }

    .social-section { margin-top: 14px; }
    .social-grid { display: flex; flex-direction: row; gap: 10px; flex-wrap: nowrap; overflow-x: auto; }
    .social-grid > div { flex-shrink: 0; width: 200px; }
    .s-name { font-size: 11px; font-weight: 800; color: #7c3aed; letter-spacing: .5px; margin-bottom: 4px; }
    /* Socials — aspect ratio 1:1 (200×200) */
    .social-thumb { border-radius: 8px; width: 100%; aspect-ratio: 1/1; max-width: 200px; object-fit: cover; object-position: center; background: #ddd; display: block; }
    .social-link { text-decoration: none; }

    .yt-section { margin-top: 14px; }
    .yt-label { font-size: 11px; font-weight: 800; color: #7c3aed; letter-spacing: 1px; margin-bottom: 8px; }
    .yt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    /* Video thumbnail — aspect ratio 16:9 (640×360) */
    .yt-thumb { border-radius: 8px; width: 100%; aspect-ratio: 16/9; object-fit: cover; object-position: center; background: #ddd; display: block; }
    .yt-link { text-decoration: none; display: block; }
    .yt-title { color: #444; margin-top: 4px; font-weight: 500; line-height: 1.4; }

    .loading { text-align: center; padding: 20px; color: #aaa; font-size: 13px; }
    .contact-label { font-weight: 800; letter-spacing: 1px; margin-bottom: 16px; }
    .contact-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .contact-item { display: flex; align-items: center; gap: 14px; text-decoration: none; background: #fff; border: 1px solid #f0e6ff; border-radius: 12px; padding: 14px 16px; transition: background 0.15s; }
    .contact-item:hover { background: #f5f0ff; }
    .contact-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .contact-platform { opacity: 0.7; margin-bottom: 2px; }
    .contact-handle { font-weight: 700; }
    .yt-page-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .yt-card { text-decoration: none; display: block; }
    .yt-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; background: #ddd; display: block; }
    .yt-card-title { color: #444; margin-top: 4px; font-weight: 500; line-height: 1.4; }
    .news-item { padding: 10px 0; border-bottom: 1px solid #f0e6ff; }
    .news-item:last-child { border-bottom: none; }
    .news-date { color: #aaa; margin-bottom: 2px; }
    .news-title { color: #444; }
    .works-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
    .work-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }
    .work-title { color: #7c3aed; font-weight: 700; margin-top: 4px; }

    @media (max-width: 640px) {
      .top-banner { height: 160px; }
      .top-banner img { height: 160px; }
      .main { flex-direction: column; }
      .sidebar { width: 100%; display: flex; flex-direction: row; overflow-x: auto; padding: 0; border-right: none; border-bottom: 1px solid #e5e5e5; }
      .sidebar a { flex-shrink: 0; padding: 6px 12px; border-bottom: none; border-right: 1px solid #f0e6ff; font-size: 11px; }
      .lower { flex-direction: column; }
      .profile-wrap { width: 100%; }
      .profile-img { width: calc((100% - 12px) * 3/4); aspect-ratio: 210/297; }
      .calendar-wrap { width: 100%; }
      .social-grid { display: flex; grid-template-columns: unset; flex-direction: row; overflow-x: auto; flex-wrap: nowrap; }
      .social-grid > div { flex-shrink: 0; width: 140px; }
      .works-cal-row { flex-direction: column; }
      .works-cal-left { width: 100%; }
      .yt-grid { display: flex; grid-template-columns: unset; flex-direction: row; overflow-x: auto; flex-wrap: nowrap; gap: 10px; }
      .yt-link { flex-shrink: 0; width: calc((100vw - 48px) / 3); }
      .yt-page-grid { grid-template-columns: repeat(2, 1fr); }
      .contact-list { grid-template-columns: 1fr; }
      .works-grid { grid-template-columns: 1fr; }
      .work-item img { height: auto; aspect-ratio: 16/9; }
      .tab { padding: 10px 14px; font-size: 13px; }

      .cal-grid .day { font-size: 13px; padding: 6px 2px; }
      .cal-grid .day-label { font-size: 11px; }
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="spinner-text">กำลังโหลด...</div>
  </div>

  <div class="top-banner" id="banner-box">
    <div class="banner-dots" id="banner-dots"></div>
  </div>

  <nav class="navbar">
    <span class="nav-logo" id="nav-logo">✿ Bonnie Official TH</span>
  </nav>

  <div class="main">
    <aside class="sidebar">
      <a href="#" onclick="showPage('home',this)">HOME</a>
      <a href="#" onclick="showPage('youtube',this)">YOUTUBE</a>
      <a href="#" onclick="showPage('contact',this)">CONTACT US</a>
    </aside>

    <div class="content">

      <!-- หน้า HOME -->
      <div id="page-home">

      <div class="tabs-row">
        <div class="tab active" onclick="switchTab('profile',this)">PROFILE</div>
        <div class="tab" onclick="switchTab('works',this)">WORKS</div>
        <div class="tab" onclick="switchTab('news',this)">NEWS</div>
      </div>

      <div class="tab-content active" id="tab-profile">
        <div class="profile-slider-wrap">
          <button class="profile-nav left" onclick="scrollProfile(-1)">&#8249;</button>
          <div class="profile-slider" id="profile-slider"></div>
          <button class="profile-nav right" onclick="scrollProfile(1)">&#8250;</button>
        </div>
        <p class="bio-text" id="bio-text"></p>

        <div class="social-section">
          <div class="social-grid" id="social-grid">
            <div><div class="s-name">IG</div><div class="social-thumb" style="background:#ddd"></div></div>
            <div><div class="s-name">X</div><div class="social-thumb" style="background:#ddd"></div></div>
            <div><div class="s-name">TIKTOK</div><div class="social-thumb" style="background:#ddd"></div></div>
            <div><div class="s-name">WEIBO</div><div class="social-thumb" style="background:#ddd"></div></div>
          </div>
        </div>

        <div class="yt-section">
          <div class="yt-label">OFFICIAL VIDEO</div>
          <div class="yt-grid" id="yt-grid">
            <div class="yt-thumb" style="background:#ddd"></div>
            <div class="yt-thumb" style="background:#ddd"></div>
          </div>
        </div>
      </div>

      <div class="tab-content" id="tab-works">
        <div class="works-section">
          <div class="cal-label" style="margin-bottom:8px">SCHEDULE</div>
          <div class="works-cal-row">
            <div class="works-cal-left">
              <div class="calendar">
                <div class="cal-header">
                  <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
                  <select id="cal-month" onchange="renderCalendar()">
                    <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
                    <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
                    <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
                    <option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
                  </select>
                  <select id="cal-year" onchange="renderCalendar()">
                    <option selected>2025</option><option>2026</option>
                  </select>
                  <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
                </div>
                <div class="cal-grid" id="cal-grid"></div>
              </div>
            </div>
            <div class="works-cal-right">
              <div id="event-detail" style="display:none; border:1px solid #d8b4fe; border-radius:8px; padding:12px; background:#fff; height:100%;">
                <div id="event-date-title" style="font-size:12px; font-weight:800; color:#7c3aed; margin-bottom:10px;"></div>
                <div id="event-list"></div>
              </div>
            </div>
          </div>
          <div class="works-grid" id="works-grid" style="margin-top:14px"></div>
        </div>
      </div>

      <div class="tab-content" id="tab-news">
        <div id="news-list"><div class="loading">กำลังโหลด...</div></div>
      </div>

      </div><!-- end page-home -->

      <!-- หน้า YOUTUBE -->
      <div id="page-youtube" style="display:none">
        <div class="yt-label">YOUTUBE</div>
        <div class="yt-page-grid" id="yt-page-grid">
          <div class="loading">กำลังโหลด...</div>
        </div>
      </div>

      <!-- หน้า CONTACT US -->
      <div id="page-contact" style="display:none">
        <div class="contact-label">CONTACT US</div>
        <div class="contact-list" id="contact-list">
          <div class="loading">กำลังโหลด...</div>
        </div>
      </div>

    </div>
  </div>

<script>
// 🔧 ใส่ URL Google Sheets ตรงนี้
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1aAyI6iVaNDvBRWbwCvd8nMnBMrRMQPoxXR6Kix-iFvb9tDCXJDugY3NalvvY5ZSjIA8uGmJdCcpm/pub?output=csv&gid=0";

// gid ของแต่ละ sheet (ดูได้จาก URL ตอนคลิก tab ใน Sheets)
const GID = {
  config:   0,
  slider:   214809573,
  works:    326427666,
  news:     2006339432,
  socials:  1571914792,
  videos:   1639743877,
  schedule: 1512851118,
  youtube:  1689560596,
  contact:  1062772734
};

let scheduleDates = [];
let sliderImages = [];
let sliderIndex = 0;
let sliderTimer;

function getSheetUrl(gid) {
  return SHEET_URL.replace(/gid=\d+/, "gid=" + gid);
}

async function fetchCSV(gid) {
  try {
    const res = await fetch(getSheetUrl(gid));
    const text = await res.text();
    return text.trim().split("\n").slice(1).map(row =>
      row.split(",").map(c => c.trim().replace(/^"|"$/g, ""))
    ).filter(r => r[0]);
  } catch(e) { return []; }
}

function convertDriveUrl(url) {
  if (!url) return "";
  const m = url.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
  if (m) return "https://lh3.googleusercontent.com/d/" + m[1];
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
  if (m2) return "https://lh3.googleusercontent.com/d/" + m2[1];
  return url;
}

async function loadConfig() {
  const rows = await fetchCSV(GID.config);
  const cfg = {};
  rows.forEach(r => { if(r[0]) cfg[r[0]] = r[1]; });

  // โหลดรูปโปรไฟล์หลายรูป (profile_img_1, profile_img_2, ...)
  const slider = document.getElementById("profile-slider");
  if (slider) {
    let imgs = "";
    let i = 1;
    while (cfg["profile_img_" + i]) {
      imgs += '<img class="profile-img" src="' + convertDriveUrl(cfg["profile_img_" + i]) + '" alt="Profile ' + i + '">';
      i++;
    }
    // fallback ถ้าใช้ key เก่า profile_img_url
    if (!imgs && cfg.profile_img_url) {
      imgs = '<img class="profile-img" src="' + convertDriveUrl(cfg.profile_img_url) + '" alt="Profile">';
    }
    if (imgs) {
      slider.innerHTML = imgs;
      // อัปเดตปุ่มหลังโหลดรูป
      setTimeout(updateProfileNav, 100);
      slider.addEventListener("scroll", updateProfileNav, { passive: true });
    }

    // drag to scroll (คอม)
    let isDown = false, startX = 0, scrollLeft = 0;
    slider.addEventListener("mousedown", e => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; slider.style.cursor = "grabbing"; });
    slider.addEventListener("mouseleave", () => { isDown = false; slider.style.cursor = "grab"; });
    slider.addEventListener("mouseup", () => { isDown = false; slider.style.cursor = "grab"; });
    slider.addEventListener("mousemove", e => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - slider.offsetLeft;
      slider.scrollLeft = scrollLeft - (x - startX);
    });
  }

  if (cfg.bio) document.getElementById("bio-text").textContent = cfg.bio;
  if (cfg.navbar_color) document.querySelector(".navbar").style.background = cfg.navbar_color;
  if (cfg.site_name) {
    document.getElementById("nav-logo").textContent = cfg.site_name;
    document.title = cfg.site_name;
  }

  // ฟ้อนและสีตัวหนังสือ
  if (cfg.font_family) {
    const systemFonts = ["Arial","Helvetica","Georgia","sans-serif","serif","monospace","Tahoma","Verdana"];
    if (!systemFonts.includes(cfg.font_family)) {
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = "https://fonts.googleapis.com/css2?family=" + cfg.font_family.replace(/ /g, "+") + "&display=swap";
      document.head.appendChild(link);
    }
    document.body.style.fontFamily = cfg.font_family + ", sans-serif";
  }
  if (cfg.font_size) document.body.style.fontSize = cfg.font_size;
  if (cfg.font_color) document.body.style.color = cfg.font_color;
  if (cfg.heading_color) {
    const style = document.createElement("style");
    style.textContent = ".cal-label,.yt-label,.s-name,.contact-label,.yt-page-label,.sidebar a,.tab.active,.contact-handle,.work-title { color: " + cfg.heading_color + " !important; } .navbar { background: " + (cfg.navbar_color || "#c084fc") + "; }";
    document.head.appendChild(style);
  }
  if (cfg.highlight_color) {
    const style = document.createElement("style");
    style.textContent = ".event-dot { background: " + cfg.highlight_color + " !important; } .day.today .event-dot { background: #fff !important; }";
    document.head.appendChild(style);
  }

  // ฟ้อนแยกแต่ละหน้า
  window._pageFonts = {
    home:    { font: cfg.font_home    || cfg.font_family || "", size: cfg.font_size_home    || cfg.font_size || "", color: cfg.font_color_home    || cfg.font_color || "" },
    youtube: { font: cfg.font_youtube || cfg.font_family || "", size: cfg.font_size_youtube || cfg.font_size || "", color: cfg.font_color_youtube || cfg.font_color || "" },
    works:   { font: cfg.font_works   || cfg.font_family || "", size: cfg.font_size_works   || cfg.font_size || "", color: cfg.font_color_works   || cfg.font_color || "" },
    news:    { font: cfg.font_news    || cfg.font_family || "", size: cfg.font_size_news    || cfg.font_size || "", color: cfg.font_color_news    || cfg.font_color || "" },
    contact: { font: cfg.font_contact || cfg.font_family || "", size: cfg.font_size_contact || cfg.font_size || "", color: cfg.font_color_contact || cfg.font_color || "" }
  };

  // โหลด Google Fonts ทุกฟ้อนที่ต้องใช้
  const allFonts = [...new Set(Object.values(window._pageFonts).map(p => p.font).filter(Boolean))];
  const systemFonts2 = ["Arial","Helvetica","Georgia","sans-serif","serif","monospace","Tahoma","Verdana"];
  allFonts.filter(f => !systemFonts2.includes(f)).forEach(f => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=" + f.replace(/ /g, "+") + "&display=swap";
    document.head.appendChild(link);
  });

  // เปลี่ยนฟ้อนตามหน้าปัจจุบัน
  applyPageFont("home");
}

async function loadSlider() {
  const rows = await fetchCSV(GID.slider);
  sliderImages = rows.map(r => convertDriveUrl(r[0])).filter(Boolean);
  const box = document.getElementById("banner-box");
  const dotsEl = document.getElementById("banner-dots");
  if (!sliderImages.length) return;

  sliderImages.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = src;
    if (i === 0) img.classList.add("active");
    box.insertBefore(img, dotsEl);
  });

  dotsEl.innerHTML = sliderImages.map((_, i) =>
    '<div class="dot' + (i===0?' active':'') + '" onclick="goSlide(' + i + ')"></div>'
  ).join("");

  startSlider();
}

function goSlide(i) {
  const imgs = document.querySelectorAll("#banner-box img");
  const dots = document.querySelectorAll("#banner-dots .dot");
  imgs.forEach(el => el.classList.remove("active"));
  dots.forEach(el => el.classList.remove("active"));
  sliderIndex = (i + sliderImages.length) % sliderImages.length;
  imgs[sliderIndex].classList.add("active");
  dots[sliderIndex].classList.add("active");
}

function startSlider() {
  if (sliderImages.length < 2) return;
  clearInterval(sliderTimer);
  sliderTimer = setInterval(() => goSlide(sliderIndex + 1), 3000);

  const box = document.getElementById("banner-box");

  // Touch swipe (มือถือ)
  let startX = 0;
  box.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, { passive: true });
  box.addEventListener("touchend", e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) {
      clearInterval(sliderTimer);
      goSlide(sliderIndex + (diff > 0 ? 1 : -1));
      startSlider();
    }
  }, { passive: true });

  // Mouse drag (คอม)
  let mouseStartX = 0;
  let dragging = false;
  box.addEventListener("mousedown", e => { mouseStartX = e.clientX; dragging = true; });
  box.addEventListener("mouseup", e => {
    if (!dragging) return;
    dragging = false;
    const diff = mouseStartX - e.clientX;
    if (Math.abs(diff) > 40) {
      clearInterval(sliderTimer);
      goSlide(sliderIndex + (diff > 0 ? 1 : -1));
      startSlider();
    }
  });
}

async function loadWorks() {
  const rows = await fetchCSV(GID.works);
  const grid = document.getElementById("works-grid");
  if (!rows.length || !grid) return;
  grid.innerHTML = rows.map(r =>
    '<div class="work-item"><a href="' + (r[2]||'#') + '" target="_blank"><img src="' + convertDriveUrl(r[1]) + '" alt="' + r[0] + '"></a><div class="work-title">' + r[0] + '</div></div>'
  ).join("");
}

async function loadNews() {
  const rows = await fetchCSV(GID.news);
  const list = document.getElementById("news-list");
  if (!rows.length) { list.innerHTML = "<div class='loading'>ยังไม่มีข้อมูล</div>"; return; }
  list.innerHTML = rows.map(r =>
    '<div class="news-item"><div class="news-date">' + r[0] + '</div><div class="news-title"><a href="' + (r[2]||'#') + '" target="_blank" style="color:#444;text-decoration:none">' + r[1] + '</a></div></div>'
  ).join("");
}

async function loadSocials() {
  const rows = await fetchCSV(GID.socials);
  if (!rows.length) return;
  document.getElementById("social-grid").innerHTML = rows.map(r =>
    '<div><div class="s-name">' + r[0] + '</div><a href="' + (r[2]||'#') + '" target="_blank" class="social-link"><img src="' + convertDriveUrl(r[1]) + '" class="social-thumb" alt="' + r[0] + '"></a></div>'
  ).join("");
}

function updateProfileNav() {
  const slider = document.getElementById("profile-slider");
  const btnLeft = document.querySelector(".profile-nav.left");
  const btnRight = document.querySelector(".profile-nav.right");
  if (!slider || !btnLeft || !btnRight) return;
  const atStart = slider.scrollLeft <= 4;
  const atEnd = slider.scrollLeft + slider.clientWidth >= slider.scrollWidth - 4;
  btnLeft.classList.toggle("hidden", atStart);
  btnRight.classList.toggle("hidden", atEnd);
}

async function loadContact() {
  const rows = await fetchCSV(GID.contact);
  const list = document.getElementById("contact-list");
  if (!rows.length || !list) return;
  list.innerHTML = rows.map(r => {
    const platform = r[0] || "";
    const handle   = r[1] || "";
    const url      = r[2] || "#";
    const color    = r[3] || "#7c3aed";
    const icon     = r[4] || platform.substring(0,2).toUpperCase();
    return '<a href="' + url + '" target="_blank" class="contact-item">' +
      '<div class="contact-icon" style="background:' + color + '">' + icon + '</div>' +
      '<div class="contact-info">' +
        '<div class="contact-platform">' + platform + '</div>' +
        '<div class="contact-handle">' + handle + '</div>' +
      '</div></a>';
  }).join("");
}

function scrollProfile(dir) {
  const slider = document.getElementById("profile-slider");
  const imgWidth = slider.querySelector(".profile-img")?.offsetWidth || 0;
  slider.scrollBy({ left: dir * (imgWidth + 12), behavior: "smooth" });
  setTimeout(updateProfileNav, 350);
}

function applyPageFont(page) {
  if (!window._pageFonts) return;
  const p = window._pageFonts[page];
  if (!p) return;
  if (p.font)  document.body.style.fontFamily = p.font + ", sans-serif";
  if (p.size)  document.body.style.fontSize = p.size;
  if (p.color) document.body.style.color = p.color;
}

function showPage(page, el) {
  document.getElementById("page-home").style.display = page === "home" ? "block" : "none";
  document.getElementById("page-youtube").style.display = page === "youtube" ? "block" : "none";
  document.getElementById("page-contact").style.display = page === "contact" ? "block" : "none";
  document.querySelectorAll(".sidebar a").forEach(a => a.classList.remove("active-menu"));
  if (el) el.classList.add("active-menu");
  applyPageFont(page);
}

function getYoutubeThumbnail(url) {
  if (!url) return "";
  const m = url.match(/(?:v=|youtu\.be\/|live\/)([^&?\/]+)/);
  if (!m) return "";
  const id = m[1];
  return "https://img.youtube.com/vi/" + id + "/maxresdefault.jpg";
}

function getFallbackThumbnail(id) {
  return "https://img.youtube.com/vi/" + id + "/hqdefault.jpg";
}

async function loadVideos() {
  // Official Video — ดึงจาก sheet Videos
  const rows = await fetchCSV(GID.videos);
  const ytGrid = document.getElementById("yt-grid");
  if (ytGrid && rows.length) {
    ytGrid.innerHTML = rows.map(r => {
      const url = r[0] || "";
      const title = r[1] || "";
      const id = (url.match(/(?:v=|youtu\.be\/|live\/)([^&?\/]+)/) || [])[1] || "";
      return '<a href="' + url + '" target="_blank" class="yt-link"><img src="' + getYoutubeThumbnail(url) + '" class="yt-thumb" alt="' + title + '" onerror="this.onerror=null;this.src=\'https://img.youtube.com/vi/' + id + '/hqdefault.jpg\'">' + (title ? '<div class="yt-title">' + title + '</div>' : '') + '</a>';
    }).join("");
  }

  // หน้า YouTube — ดึงจาก sheet Youtube แยก
  const ytRows = await fetchCSV(GID.youtube);
  const ytPageGrid = document.getElementById("yt-page-grid");
  if (ytPageGrid && ytRows.length) {
    ytPageGrid.innerHTML = ytRows.map(r => {
      const url = r[0] || "";
      const title = r[1] || "";
      const id = (url.match(/(?:v=|youtu\.be\/|live\/)([^&?\/]+)/) || [])[1] || "";
      return '<a href="' + url + '" target="_blank" class="yt-card"><img src="' + getYoutubeThumbnail(url) + '" alt="' + title + '" onerror="this.onerror=null;this.src=\'https://img.youtube.com/vi/' + id + '/hqdefault.jpg\'"><div class="yt-card-title">' + title + '</div></a>';
    }).join("");
  }
}

let scheduleEvents = []; // [{date, title, location, time, livestream, with}]

async function loadSchedule() {
  const rows = await fetchCSV(GID.schedule);
  scheduleEvents = rows.filter(r => r[0]).map(r => ({
    date: r[0], title: r[1]||'', location: r[2]||'', time: r[3]||'', livestream: r[4]||'', with: r[5]||''
  }));
  scheduleDates = [...new Set(scheduleEvents.map(e => e.date))];
  renderCalendar();
}

function showEvents(dateStr) {
  const events = scheduleEvents.filter(e => e.date === dateStr);
  const detail = document.getElementById("event-detail");
  const list = document.getElementById("event-list");
  const title = document.getElementById("event-date-title");
  if (!events.length) { detail.style.display = "none"; return; }
  const [y, m, d] = dateStr.split("-");
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  title.textContent = d + " " + months[parseInt(m)-1] + " " + y;
  list.innerHTML = events.map(e =>
    '<div class="event-item">' +
    '<div class="e-name">' + e.title + '</div>' +
    (e.location ? '<div class="e-row"><span>Location :</span>' + e.location + '</div>' : '') +
    (e.time ? '<div class="e-row"><span>Time :</span>' + e.time + '</div>' : '') +
    (e.livestream ? '<div class="e-row"><span>Live Streaming :</span><a href="' + e.livestream + '" target="_blank" style="color:#7c3aed">' + e.livestream + '</a></div>' : '') +
    (e.with ? '<div class="e-row"><span>With :</span>' + e.with + '</div>' : '') +
    '</div>'
  ).join("");
  detail.style.display = "block";
  document.querySelectorAll(".cal-grid .day").forEach(el => el.classList.remove("selected"));
}

function renderCalendar() {
  const today = new Date();
  const selMonth = document.getElementById("cal-month");
  const selYear = document.getElementById("cal-year");

  // ถ้ายังไม่เคย set ให้ใช้เดือนปัจจุบัน
  if (!selMonth.dataset.initialized) {
    selMonth.value = today.getMonth();
    selYear.value = today.getFullYear();
    // เพิ่ม option ปีปัจจุบันถ้ายังไม่มี
    if (![...selYear.options].some(o => parseInt(o.value) === today.getFullYear())) {
      const opt = document.createElement("option");
      opt.value = today.getFullYear();
      opt.textContent = today.getFullYear();
      selYear.appendChild(opt);
      selYear.value = today.getFullYear();
    }
    selMonth.dataset.initialized = "1";
  }

  const month = parseInt(selMonth.value);
  const year = parseInt(selYear.value);
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const days = ["Su","Mo","Tu","We","Th","Fr","Sa"];
  let html = days.map(d => '<div class="day-label">' + d + '</div>').join("");
  for (let i = 0; i < firstDay; i++) html += '<div class="day muted"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = year + "-" + String(month+1).padStart(2,'0') + "-" + String(d).padStart(2,'0');
    const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    const isEvent = scheduleDates.includes(dateStr);
    const cls = isToday ? "today" : isEvent ? "highlight" : "";
    const dot = isEvent ? '<span class="event-dot"></span>' : '';
    html += '<div class="day ' + cls + '" onclick="showEvents(\'' + dateStr + '\', this)">' + d + dot + '</div>';
  }
  const remaining = (7 - (firstDay + daysInMonth) % 7) % 7;
  for (let i = 1; i <= remaining; i++) html += '<div class="day muted">' + i + '</div>';
  document.getElementById("cal-grid").innerHTML = html;
  if (document.getElementById("event-detail")) document.getElementById("event-detail").style.display = "none";
}

function changeMonth(dir) {
  const sel = document.getElementById("cal-month");
  const yrSel = document.getElementById("cal-year");
  let m = parseInt(sel.value) + dir;
  let y = parseInt(yrSel.value);
  if (m < 0) { m = 11; y--; }
  if (m > 11) { m = 0; y++; }
  sel.value = m;
  yrSel.value = y;
  renderCalendar();
}

function switchTab(name, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("tab-" + name).classList.add("active");
}

async function init() {
  renderCalendar();
  await Promise.all([
    loadConfig(), loadSlider(), loadWorks(),
    loadNews(), loadSocials(), loadVideos(), loadSchedule(), loadContact()
  ]);
  // ซ่อน spinner หลังโหลดเสร็จ
  const overlay = document.getElementById("loading-overlay");
  if (overlay) {
    overlay.style.opacity = "0";
    overlay.style.transition = "opacity 0.3s";
    setTimeout(() => overlay.style.display = "none", 300);
  }
}

init();
